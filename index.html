<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akku | Portrait Arts</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --white: #ffffff;
            --green-glow: #00ff00;
            --card-border: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .animated-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(3.5rem, 12vw, 8.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(to right, #fff 20%, var(--green-glow) 40%, var(--green-glow) 60%, #fff 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .tagline {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--green-glow);
            margin-top: 10px;
            text-shadow: 0 0 10px var(--green-glow);
        }

        /* 2. PORTRAIT SCROLL GALLERY */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* Portrait width */
            gap: 30px;
        }

        .art-card {
            position: relative;
            /* Portrait Aspect Ratio (e.g., 4:5 or 9:16) */
            aspect-ratio: 9 / 14; 
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--green-glow);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.9s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .art-card.reveal { opacity: 1; transform: translateY(0); }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .art-card:hover {
            box-shadow: 0 0 30px var(--green-glow);
            border-color: #fff;
        }

        .art-card:hover img { transform: scale(1.1); }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: 0.4s;
        }

        .art-card:hover .overlay { opacity: 1; }
        .overlay span { font-size: 11px; color: var(--green-glow); letter-spacing: 1px; font-weight: 600; }

        footer { padding: 80px 20px; text-align: center; color: #444; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <h1 class="animated-name">AKKU</h1>
        <p class="tagline">Sovereign Portrait Collection</p>
    </header>

    <div class="container">
        <div class="gallery-grid" id="gallery"></div>
    </div>

    <footer>
        <p>A MASTERPIECE VISION BY ADAM & REAL AIRA</p>
    </footer>

    <script>
        const gallery = document.getElementById('gallery');
        
        // Loop for 12 Portrait Photos (akku1.jpg to akku12.jpg)
        for (let i = 1; i <= 12; i++) {
            const card = document.createElement('div');
            card.className = 'art-card';
            card.innerHTML = `
                <img src="akku${i}.jpg" alt="Edit ${i}" onerror="this.src='https://via.placeholder.com/900x1400/111/00FF00?text=PORTRAIT+${i}'">
                <div class="overlay">
                    <span>ARTWORK #${i}</span>
                </div>
            `;
            gallery.appendChild(card);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.art-card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
